name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python lint + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff + lightweight deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff fastapi "uvicorn[standard]" python-multipart pydantic python-dotenv httpx supabase

      - name: Ruff lint
        run: ruff check transcritor

      - name: Ruff format check
        run: ruff format --check transcritor

      - name: Import check (no model load, no DB)
        env:
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_KEY: "ci-placeholder-key"
        run: |
          python -c "from transcritor import database, server, cli; print('imports ok')"

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
